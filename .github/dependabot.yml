# Dependabot — https://docs.github.com/en/code-security/dependabot
version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: npm
    directory: /demos
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    groups:
      causet-sdk:
        patterns:
          - "@causet/*"
      npm-dev:
        dependency-type: development
        patterns:
          - "*"

